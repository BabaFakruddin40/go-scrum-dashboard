name: dev

services:
  jboard:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://scrum:scrum@postgres:5432/scrum_dashboard?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - monitoring

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=scrum_dashboard
      - POSTGRES_USER=scrum
      - POSTGRES_PASSWORD=scrum
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrum -d scrum_dashboard"]
      interval: 5s
      timeout: 3s
      retries: 8
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v3.13.1-distroless
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'      
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:nightly-distroless-slim
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  pgdata: